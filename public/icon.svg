<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#c45d3e"/>
  <g transform="translate(96, 80)">
    <!-- Paper top -->
    <rect x="60" y="0" width="200" height="120" rx="8" fill="#fff" opacity="0.9"/>
    <!-- Printer body -->
    <rect x="0" y="100" width="320" height="160" rx="20" fill="#fff"/>
    <!-- Paper slot -->
    <rect x="60" y="100" width="200" height="12" rx="4" fill="#e07b5f"/>
    <!-- Output paper -->
    <rect x="80" y="260" width="160" height="80" rx="6" fill="#fff" opacity="0.9"/>
    <!-- Lines on output paper -->
    <rect x="100" y="278" width="120" height="6" rx="3" fill="#e07b5f" opacity="0.5"/>
    <rect x="100" y="296" width="80" height="6" rx="3" fill="#e07b5f" opacity="0.5"/>
    <rect x="100" y="314" width="100" height="6" rx="3" fill="#e07b5f" opacity="0.5"/>
    <!-- Button -->
    <circle cx="270" cy="180" r="16" fill="#c45d3e"/>
    <!-- Indicator light -->
    <circle cx="50" cy="180" r="8" fill="#4ade80"/>
  </g>
</svg>
